<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1D4ED8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad)" rx="16"/>

  <!-- Subtle grid dots -->
  <g opacity="0.12">
    <circle cx="60" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="120" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="180" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="60" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="120" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="180" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="60" cy="180" r="2.5" fill="#2563EB"/>
    <circle cx="120" cy="180" r="2.5" fill="#2563EB"/>
    <circle cx="620" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="680" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="740" cy="60" r="2.5" fill="#2563EB"/>
    <circle cx="620" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="680" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="740" cy="120" r="2.5" fill="#2563EB"/>
    <circle cx="620" cy="360" r="2.5" fill="#2563EB"/>
    <circle cx="680" cy="360" r="2.5" fill="#2563EB"/>
    <circle cx="740" cy="360" r="2.5" fill="#2563EB"/>
  </g>

  <!-- Pulse rings behind pin -->
  <circle cx="400" cy="195" r="90" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.12"/>
  <circle cx="400" cy="195" r="120" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.08"/>
  <circle cx="400" cy="195" r="150" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.05"/>

  <!-- Location pin shadow/base -->
  <ellipse cx="400" cy="320" rx="28" ry="8" fill="#1D4ED8" opacity="0.2"/>

  <!-- Location pin shape -->
  <g filter="url(#shadow)">
    <path d="M400 95 C365 95 335 125 335 162 C335 210 400 310 400 310 C400 310 465 210 465 162 C465 125 435 95 400 95Z" fill="url(#pinGrad)"/>
    <!-- Inner white circle in pin -->
    <circle cx="400" cy="162" r="38" fill="white"/>
  </g>

  <!-- Tooth icon inside pin -->
  <g transform="translate(400,162)">
    <!-- Tooth body -->
    <path d="M-16 -14 C-16 -22 -8 -26 0 -26 C8 -26 16 -22 16 -14 C16 -6 14 4 10 14 C8 18 6 20 4 20 C2 20 1 18 0 14 C-1 18 -2 20 -4 20 C-6 20 -8 18 -10 14 C-14 4 -16 -6 -16 -14Z" fill="#2563EB"/>
    <!-- Tooth highlight -->
    <path d="M-8 -20 C-12 -18 -14 -12 -12 -8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>

  <!-- Left side text block -->
  <g>
    <rect x="60" y="150" width="260" height="4" fill="#2563EB" rx="2" opacity="0.8"/>
    <text x="60" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2563EB" font-weight="600" letter-spacing="2" opacity="0.7">DENTAL GUIDE</text>
    <text x="60" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#1E3A5F" leading="36">How to Find</text>
    <text x="60" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#1E3A5F">the Right</text>
    <text x="60" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#2563EB">Dentist Near You</text>
    <text x="60" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#475569">in Gulshan &amp; Dhaka</text>

    <!-- Clinic tag -->
    <rect x="60" y="330" width="210" height="40" rx="20" fill="#2563EB"/>
    <text x="165" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600" text-anchor="middle">Faisal&apos;s Dental Care · Gulshan-1</text>
  </g>

  <!-- Right side small info cards -->
  <g>
    <!-- Card 1 -->
    <rect x="520" y="140" width="220" height="60" rx="14" fill="white" opacity="0.85"/>
    <circle cx="548" cy="170" r="14" fill="#EFF6FF"/>
    <text x="548" y="175" font-family="system-ui" font-size="14" text-anchor="middle" fill="#2563EB">📍</text>
    <text x="572" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">Niketan, Gulshan-1</text>
    <text x="572" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Dhaka-1212</text>

    <!-- Card 2 -->
    <rect x="520" y="215" width="220" height="60" rx="14" fill="white" opacity="0.85"/>
    <circle cx="548" cy="245" r="14" fill="#F0FDF4"/>
    <text x="548" y="250" font-family="system-ui" font-size="14" text-anchor="middle" fill="#16A34A">✓</text>
    <text x="572" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">28 Years Experience</text>
    <text x="572" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">FICD Fellow · USA</text>

    <!-- Card 3 -->
    <rect x="520" y="290" width="220" height="60" rx="14" fill="white" opacity="0.85"/>
    <circle cx="548" cy="320" r="14" fill="#FFF7ED"/>
    <text x="548" y="325" font-family="system-ui" font-size="14" text-anchor="middle" fill="#EA580C">★</text>
    <text x="572" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">5.0 Google Rating</text>
    <text x="572" y="329" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Verified patients</text>
  </g>
</svg>
